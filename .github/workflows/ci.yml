name: Community Connect CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

jobs:
  backend:
    name: Backend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Backend Dependencies
        run: npm install

      - name: Check Backend Build
        run: npm run build --if-present

      - name: Run Backend Tests
        run: npm test --if-present

  admin-frontend:
    name: Admin Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: admin-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Admin Frontend Dependencies
        run: npm install

      - name: Build Admin Frontend
        run: npm run build

      - name: Run Admin Frontend Tests
        run: npm test --if-present

  user-frontend:
    name: User Frontend CI
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: user-frontend

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install User Frontend Dependencies
        run: npm install

      - name: Build User Frontend
        run: npm run build

      - name: Run User Frontend Tests
        run: npm test --if-present